<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Solicitudes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Solicitudes Recibidas</h1>
    <div class = "opciones">
        <div>
            <button class="btn-refresh" onclick="cargarSolicitudes()">Actualizar</button>
        </div>
        <div class = "buscar_input">
            <form id="formBuscar">
                <input id=buscarSolicitud type="text" placeholder="buscar solicitud">
                <button class="btn-refresh" type="submit"> Buscar</button>
            </form>
        </div>
    </div>
    
    
    <table id="tablaSolicitudes">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Descripción</th>
        </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>
<script src="script.js"></script>
</body>
</html>
